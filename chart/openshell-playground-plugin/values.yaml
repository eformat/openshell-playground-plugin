replicaCount: 1

image:
  repository: quay.io/eformat/openshell-playground-plugin
  tag: latest
  pullPolicy: Always

plugin:
  name: openshell-playground-plugin
  displayName: "OpenShell Playground"
  description: "Deploy and interact with OpenShell agent sandboxes"
  port: 9443

service:
  type: ClusterIP
  port: 9443

tls:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  name: ""
