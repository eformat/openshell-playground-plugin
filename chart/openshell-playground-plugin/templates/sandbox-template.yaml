{{- if .Values.sandboxTemplate.enabled }}
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: {{ .Values.sandboxTemplate.name }}
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    openshell.nvidia.com/display-name: "Hermes Agent"
    openshell.nvidia.com/description: "Hermes agentic framework with MCP tool integration"
spec:
  envVarsInjectionPolicy: Allowed
  networkPolicyManagement: Unmanaged
  podTemplate:
    spec:
      serviceAccountName: openshell-sandbox
      automountServiceAccountToken: false
      dnsPolicy: ClusterFirst
      securityContext:
        fsGroup: 1001
      initContainers:
        - name: openshell-supervisor-install
          image: {{ .Values.sandboxTemplate.supervisorImage }}
          command:
            - /openshell-sandbox
            - copy-self
            - /opt/openshell/bin/openshell-sandbox
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: openshell-supervisor-bin
              mountPath: /opt/openshell/bin
      containers:
        - name: agent
          image: {{ .Values.sandboxTemplate.image }}
          command:
            - /opt/openshell/bin/openshell-sandbox
            - start
          workingDir: /sandbox
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: openshell-supervisor-bin
              mountPath: /opt/openshell/bin
              readOnly: true
            - name: workspace
              mountPath: /sandbox
      volumes:
        - name: openshell-supervisor-bin
          emptyDir: {}
        - name: workspace
          emptyDir: {}
{{- end }}
