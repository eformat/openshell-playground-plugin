---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-enable
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
rules:
  - apiGroups: ["operator.openshift.io"]
    resources: ["consoles"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-enable
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openshell-playground-plugin.fullname" . }}-enable
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-openshell
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxtemplates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxwarmpools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings"]
    verbs: ["create", "get", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-openshell
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openshell-playground-plugin.fullname" . }}-openshell
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-gateway
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxtemplates", "sandboxwarmpools", "sandboxclaims"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-gateway-escalation
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openshell-playground-plugin.fullname" . }}-gateway
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Plugin SA needs the custom SCC 'use' permission to create RoleBindings granting it
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-scc-escalation
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:openshell-sandbox
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-gateway-auth
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
# Plugin SA needs gateway-auth permissions for RBAC escalation check
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-auth-escalation
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openshell-playground-plugin.fullname" . }}-gateway-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
