apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-enable
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
rules:
  - apiGroups: ["operator.openshift.io"]
    resources: ["consoles"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-enable
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openshell-playground-plugin.fullname" . }}-enable
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-auth
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-auth
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openshell-playground-plugin.fullname" . }}-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-openshell
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "list", "get"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxtemplates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxwarmpools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings"]
    verbs: ["create", "get", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-openshell
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openshell-playground-plugin.fullname" . }}-openshell
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-gateway-escalation
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openshell-playground-plugin.fullname" . }}-gateway
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Plugin SA needs the custom SCC 'use' permission to create RoleBindings granting it
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openshell-playground-plugin.fullname" . }}-scc-escalation
  labels:
    {{- include "openshell-playground-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:openshell-sandbox
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell-playground-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
