---
apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: {{ .Values.plugin.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  displayName: {{ .Values.plugin.displayName | quote }}
  backend:
    type: Service
    service:
      name: {{ include "openshell-playground-plugin.fullname" . }}
      namespace: {{ .Release.Namespace }}
      port: {{ .Values.service.port }}
      basePath: /
  proxy:
    - alias: backend
      authorization: UserToken
      endpoint:
        type: Service
        service:
          name: {{ include "openshell-playground-plugin.fullname" . }}
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.service.port }}
